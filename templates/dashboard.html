<!-- templates/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily Dashboard</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6c757d;
      --primary: #2c3e50;
      --accent: #3498db;
      --accent-light: #eaf2f8;
      --border: #dee2e6;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --card-accent: var(--accent);
      --badge-bg: var(--accent);
      --badge-text: #fff;
      --loader-bg: #e9ecef;
      --danger: #e74c3c;
      --skeleton-shine: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
      --header-bg: rgba(255,255,255,0.85);
      --header-blur: 8px;
    }
    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --primary: #e2e8f0;
      --accent: #38bdf8;
      --accent-light: #1e293b;
      --border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --card-accent: var(--accent);
      --badge-bg: var(--accent);
      --badge-text: #0f172a;
      --loader-bg: #334155;
      --danger: #f87171;
      --skeleton-shine: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%);
      --header-bg: rgba(15,23,42,0.9);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: var(--header-bg);
      backdrop-filter: blur(var(--header-blur));
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
      margin-right: auto;
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.25rem 0.65rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .refresh-btn:hover { background: var(--accent-light); }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.25rem 0.65rem;
      color: var(--text);
    }
    .theme-toggle:hover { background: var(--accent-light); }
    .skeleton-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .skeleton-line {
      height: 16px;
      background: var(--skeleton-shine);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 4px;
      margin-bottom: 0.6rem;
    }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .article-list { margin-bottom: 2rem; }
    .card {
      background: var(--surface);
      border-left: 5px solid var(--card-accent);
      border-radius: 8px;
      padding: 1.2rem 1.3rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }
    .card h2 {
      font-size: 1.15rem;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.15em 0.7em;
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge.outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .excerpt {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
    }
    .why {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-style: italic;
    }
    .category-section { margin-top: 2.5rem; }
    .category-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .category-title svg {
      width: 20px;
      height: 20px;
      fill: var(--accent);
    }
    .category-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem;
    }
    @media (min-width: 600px) {
      .category-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 900px) {
      .category-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .rejection-log {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--surface);
      padding: 1rem;
      border-radius: 6px;
      box-shadow: var(--shadow);
    }
    .rejection-log summary { cursor: pointer; font-weight: 600; }
    .error-state {
      text-align: center;
      padding: 2rem;
      color: var(--danger);
    }
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
  </style>
</head>
<body class="light">
  <div class="container">
    <header class="header">
      <h1>AI Daily Dashboard</h1>
      <div class="header-controls">
        <span id="generated-time">Loading…</span>
        <button id="refresh-btn" class="refresh-btn" title="Refresh data">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>
    <div id="skeleton">
      <div class="skeleton-card"><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line"></div></div>
      <div class="skeleton-card"><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line"></div></div>
      <div class="skeleton-card"><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line"></div></div>
    </div>
    <div id="main-content" style="display: none;"></div>
  </div>
  <script>
    (function() {
      const toggleBtn = document.getElementById('theme-toggle');
      const refreshBtn = document.getElementById('refresh-btn');
      const body = document.body;
      const themeIcon = document.getElementById('theme-icon');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('ai-dashboard-theme');
      const currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');
      if (currentTheme === 'dark') {
        body.classList.add('dark');
        themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
      }
      toggleBtn.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        localStorage.setItem('ai-dashboard-theme', isDark ? 'dark' : 'light');
        if (isDark) {
          themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
        } else {
          themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }
      });

      function timeAgo(isoString) {
        const now = new Date();
        const then = new Date(isoString);
        const diff = Math.floor((now - then) / 1000);
        if (diff < 60) return 'just now';
        const mins = Math.floor(diff / 60);
        if (mins < 60) return `${mins} min ago`;
        const hours = Math.floor(mins / 60);
        if (hours < 24) return `${hours} hr ago`;
        return then.toLocaleString();
      }

      const categoryIcons = {
        "Model Releases": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>`,
        "Research Breakthroughs": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>`,
        "Regulation / Policy": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`,
        "Safety / Alignment": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`,
        "Enterprise / Market Impact": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="23 7 16 12 23 17 23 7"></polygon></svg>`,
        "Infrastructure / Chips": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>`,
        "Security / Misuse": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
        "General": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`
      };

      function renderCard(article) {
        const { rank, title, url, source, category, wordCount, densityScore, excerpt, whySelected } = article;
        const icon = categoryIcons[category] || categoryIcons["General"];
        return `
          <div class="card">
            <h2>${rank}. <a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(title)}</a></h2>
            <div class="card-meta">
              <span class="badge"><span style="display:inline-block;width:12px;height:12px;">${icon}</span>${escapeHtml(source)}</span>
              <span class="badge outline">${escapeHtml(category)}</span>
              <span>${wordCount} words</span>
              <span>Density ${densityScore.toFixed(1)}</span>
            </div>
            <div class="excerpt">${escapeHtml(excerpt || '')}</div>
            <div class="why">Why: ${(whySelected || []).join(', ')}</div>
          </div>
        `;
      }

      function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
      }

      function buildCategorySections(data) {
        const sectionOrder = [
          "Model Releases", "Research Breakthroughs", "Regulation / Policy",
          "Safety / Alignment", "Enterprise / Market Impact",
          "Infrastructure / Chips", "Security / Misuse", "General"
        ];
        let html = '';
        sectionOrder.forEach(cat => {
          const articles = data[catToJsonKey(cat)] || [];
          if (articles.length === 0) return;
          const icon = categoryIcons[cat] || '';
          html += `<div class="category-section">
            <div class="category-title">${icon} ${cat}</div>
            <div class="category-grid">
              ${articles.map(a => renderCard(a)).join('')}
            </div>
          </div>`;
        });
        return html;
      }

      function catToJsonKey(cat) {
        const map = {
          "Model Releases": "modelReleases",
          "Research Breakthroughs": "researchBreakthroughs",
          "Regulation / Policy": "regulationPolicy",
          "Safety / Alignment": "safetyAlignment",
          "Enterprise / Market Impact": "enterpriseMarketImpact",
          "Infrastructure / Chips": "infrastructureChips",
          "Security / Misuse": "securityMisuse",
          "General": "general"
        };
        return map[cat] || cat.replace(/\s+/g, '');
      }

      async function loadDashboard() {
        try {
          const resp = await fetch('/dashboard');
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          document.getElementById('generated-time').textContent = `Updated ${timeAgo(data.generatedAt)}`;
          document.getElementById('skeleton').style.display = 'none';
          const main = document.getElementById('main-content');
          main.style.display = 'block';
          let html = '<div class="article-list">';
          if (data.dailyTop10 && data.dailyTop10.length) {
            html += data.dailyTop10.map(renderCard).join('');
          } else {
            html += '<p>No articles passed today.</p>';
          }
          html += '</div>';
          html += buildCategorySections(data);
          if (data.rejectionLog && data.rejectionLog.length) {
            html += `<details class="rejection-log">
              <summary>Rejection log (${data.rejectionLog.length} items)</summary>
              <ul style="margin-top:0.5rem; list-style:none; padding-left:0;">
                ${data.rejectionLog.slice(0, 30).map(r => `<li>${escapeHtml(r.source)} – ${escapeHtml(r.title)} (${r.reason})</li>`).join('')}
              </ul>
            </details>`;
          }
          main.innerHTML = html;
        } catch (err) {
          document.getElementById('skeleton').style.display = 'none';
          document.getElementById('main-content').style.display = 'block';
          document.getElementById('main-content').innerHTML = `<div class="error-state"><p>Dashboard unavailable: ${err.message}</p><button onclick="loadDashboard()" class="refresh-btn">Retry</button></div>`;
        }
      }

      refreshBtn.addEventListener('click', () => {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('skeleton').style.display = 'block';
        loadDashboard();
      });

      window.loadDashboard = loadDashboard;
      loadDashboard();
    })();
  </script>
</body>
</html>
